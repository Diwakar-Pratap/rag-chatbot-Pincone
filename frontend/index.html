<!DOCTYPE html>
<html>
<head>
    <title>RAG Chatbot</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }
        #chat {
            border: 1px solid #ccc;
            padding: 10px;
            height: 400px;
            overflow-y: scroll;
        }
        .user { color: blue; }
        .bot { color: green; }
    </style>
</head>
<body>

<h2>🤖 RAG Chatbot</h2>

<div id="chat"></div>

<input id="question" placeholder="Ask something..." style="width: 80%">
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {
    const input = document.getElementById("question");
    const chat = document.getElementById("chat");

    const question = input.value;

    chat.innerHTML += `<p class="user"><b>You:</b> ${question}</p>`;

    const response = await fetch("http://127.0.0.1:8000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ question: question })
    });

    const data = await response.json();

    chat.innerHTML += `<p class="bot"><b>Bot:</b> ${data.answer}</p>`;

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
